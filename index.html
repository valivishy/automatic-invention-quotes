<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Book Quotes</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #111111;
    color: rgba(255, 255, 255, 0.9);
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 24px;
    -webkit-font-smoothing: antialiased;
  }

  .quote-wrapper {
    max-width: 720px;
    text-align: center;
    opacity: 1;
    transition: opacity 0.6s ease;
  }

  .quote-wrapper.fade-out {
    opacity: 0;
  }

  .quote-mark {
    font-size: 48px;
    line-height: 0.5;
    opacity: 0.25;
    font-family: Georgia, serif;
    margin-bottom: 16px;
  }

  .quote-text {
    font-size: 22px;
    font-style: italic;
    line-height: 1.7;
    font-weight: 400;
    letter-spacing: 0.02em;
    margin-bottom: 32px;
    white-space: pre-line;
  }

  .attribution {
    font-size: 16px;
    font-style: normal;
    opacity: 0.8;
  }

  .author {
    font-weight: 600;
    margin-bottom: 6px;
  }

  .book-info {
    font-size: 14px;
    opacity: 0.6;
    font-style: italic;
  }

  .error {
    font-size: 16px;
    opacity: 0.5;
  }

  @media (min-width: 600px) {
    body {
      padding: 80px 40px;
    }

    .quote-mark {
      font-size: 64px;
    }

    .quote-text {
      font-size: 32px;
    }

    .attribution {
      font-size: 20px;
    }

    .book-info {
      font-size: 16px;
    }
  }
</style>
</head>
<body>
<div class="quote-wrapper" id="quote">
  <p class="error">Loading...</p>
</div>

<script>
const QUOTES_URL = 'book-quotes.widget/quotes.json';
const ROTATE_MS = 30 * 60 * 1000;
const STATE_KEY = 'bq_state_v2';

// 32-bit FNV-1a over UTF-8 bytes — TOOLING-26-01 change-detection fingerprint.
function fnv1a32(str) {
  const bytes = new TextEncoder().encode(str);
  let h = 0x811c9dc5 >>> 0;
  for (let i = 0; i < bytes.length; i++) {
    h ^= bytes[i];
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h.toString(16).padStart(8, '0');
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY));
    if (s && typeof s.hash === 'string' && typeof s.idx === 'number') return s;
  } catch (_) {}
  return { hash: null, idx: 0 };
}

function saveState(state) {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

// On first render of the page: resume at stored idx if hash unchanged; otherwise idx 0.
function initialIndex(quotes, text) {
  const hash = fnv1a32(text);
  const prev = loadState();
  if (prev.hash !== hash) {
    saveState({ hash: hash, idx: 0 });
    return 0;
  }
  return prev.idx < quotes.length ? prev.idx : 0;
}

// On each rotation tick: advance idx (or reset to 0 if the pool just changed).
function nextIndex(quotes, text) {
  const hash = fnv1a32(text);
  const prev = loadState();
  const idx = prev.hash === hash ? (prev.idx + 1) % quotes.length : 0;
  saveState({ hash: hash, idx: idx });
  return idx;
}

function renderQuote(quote) {
  const wrapper = document.getElementById('quote');
  const details = [];
  if (quote.book) details.push(quote.book);
  if (quote.chapter) details.push('Ch. ' + quote.chapter);
  if (quote.page) details.push('p. ' + quote.page);

  wrapper.innerHTML =
    '<div class="quote-mark">\u201C</div>' +
    '<p class="quote-text">' + escapeHtml(quote.text) + '</p>' +
    '<div class="quote-mark">\u201D</div>' +
    '<div class="attribution">' +
      '<div class="author">\u2014 ' + escapeHtml(quote.author || 'Unknown') + '</div>' +
      (details.length > 0 ? '<div class="book-info">' + escapeHtml(details.join(', ')) + '</div>' : '') +
    '</div>';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function rotateQuote(quotes, text) {
  const wrapper = document.getElementById('quote');
  wrapper.classList.add('fade-out');
  setTimeout(function() {
    renderQuote(quotes[nextIndex(quotes, text)]);
    wrapper.classList.remove('fade-out');
  }, 600);
}

async function fetchQuotes() {
  // cache: 'no-store' bypasses the browser HTTP cache so the hash check sees
  // fresh bytes when online. The service worker still populates its Cache Storage
  // on successful responses, providing offline fallback via sw.js's fetch handler.
  const res = await fetch(QUOTES_URL, { cache: 'no-store' });
  const text = await res.text();
  return { text: text, quotes: JSON.parse(text) };
}

async function init() {
  let loaded;
  try {
    loaded = await fetchQuotes();
  } catch (_) {
    document.getElementById('quote').innerHTML = '<p class="error">Could not load quotes.</p>';
    return;
  }

  if (!loaded.quotes || loaded.quotes.length === 0) {
    document.getElementById('quote').innerHTML = '<p class="error">No quotes available.</p>';
    return;
  }

  renderQuote(loaded.quotes[initialIndex(loaded.quotes, loaded.text)]);

  // Re-fetch on every rotation so hash-check picks up scrambles without page reload.
  setInterval(async function() {
    try {
      const fresh = await fetchQuotes();
      if (fresh.quotes && fresh.quotes.length > 0) {
        rotateQuote(fresh.quotes, fresh.text);
      }
    } catch (_) {
      // offline — skip this rotation; keep the currently-displayed quote.
    }
  }, ROTATE_MS);
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
