<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Book Quotes</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #111111;
    color: rgba(255, 255, 255, 0.9);
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 24px;
    -webkit-font-smoothing: antialiased;
  }

  .quote-wrapper {
    max-width: 720px;
    text-align: center;
    opacity: 1;
    transition: opacity 0.6s ease;
  }

  .quote-wrapper.fade-out {
    opacity: 0;
  }

  .quote-mark {
    font-size: 48px;
    line-height: 0.5;
    opacity: 0.25;
    font-family: Georgia, serif;
    margin-bottom: 16px;
  }

  .quote-text {
    font-size: 22px;
    font-style: italic;
    line-height: 1.7;
    font-weight: 400;
    letter-spacing: 0.02em;
    margin-bottom: 32px;
    white-space: pre-line;
  }

  .attribution {
    font-size: 16px;
    font-style: normal;
    opacity: 0.8;
  }

  .author {
    font-weight: 600;
    margin-bottom: 6px;
  }

  .book-info {
    font-size: 14px;
    opacity: 0.6;
    font-style: italic;
  }

  .error {
    font-size: 16px;
    opacity: 0.5;
  }

  @media (min-width: 600px) {
    body {
      padding: 80px 40px;
    }

    .quote-mark {
      font-size: 64px;
    }

    .quote-text {
      font-size: 32px;
    }

    .attribution {
      font-size: 20px;
    }

    .book-info {
      font-size: 16px;
    }
  }
</style>
</head>
<body>
<div class="quote-wrapper" id="quote">
  <p class="error">Loading...</p>
</div>

<script>
const QUOTES_URL = 'book-quotes.widget/quotes.json';
const ROTATE_MS = 30 * 60 * 1000;
const STORAGE_KEY = 'bq_state';

function renderQuote(quote) {
  const wrapper = document.getElementById('quote');
  const details = [];
  if (quote.book) details.push(quote.book);
  if (quote.chapter) details.push('Ch. ' + quote.chapter);
  if (quote.page) details.push('p. ' + quote.page);

  wrapper.innerHTML =
    '<div class="quote-mark">\u201C</div>' +
    '<p class="quote-text">' + escapeHtml(quote.text) + '</p>' +
    '<div class="quote-mark">\u201D</div>' +
    '<div class="attribution">' +
      '<div class="author">\u2014 ' + escapeHtml(quote.author || 'Unknown') + '</div>' +
      (details.length > 0 ? '<div class="book-info">' + escapeHtml(details.join(', ')) + '</div>' : '') +
    '</div>';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function pickQuote(quotes) {
  const now = Date.now();
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && (now - saved.ts) < ROTATE_MS && saved.idx < quotes.length) {
      return saved.idx;
    }
  } catch (_) {}

  const idx = Math.floor(Math.random() * quotes.length);
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ idx: idx, ts: now }));
  return idx;
}

function rotateQuote(quotes) {
  const wrapper = document.getElementById('quote');
  wrapper.classList.add('fade-out');

  setTimeout(function() {
    const idx = Math.floor(Math.random() * quotes.length);
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ idx: idx, ts: Date.now() }));
    renderQuote(quotes[idx]);
    wrapper.classList.remove('fade-out');
  }, 600);
}

async function init() {
  let quotes;

  try {
    const res = await fetch(QUOTES_URL);
    quotes = await res.json();
    localStorage.setItem('bq_quotes', JSON.stringify(quotes));
  } catch (_) {
    try {
      quotes = JSON.parse(localStorage.getItem('bq_quotes'));
    } catch (__) {}
  }

  if (!quotes || quotes.length === 0) {
    document.getElementById('quote').innerHTML = '<p class="error">Could not load quotes.</p>';
    return;
  }

  const idx = pickQuote(quotes);
  renderQuote(quotes[idx]);

  setInterval(function() { rotateQuote(quotes); }, ROTATE_MS);
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
